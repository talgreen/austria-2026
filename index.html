<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- ?v= bumps when icons change. Full-bleed 512px art + manifest
         purpose any maskable so Android does not letterbox on white;
         slight center zoom keeps saturated pixels at the circular mask. -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-austria-192.png?v=1" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-austria.png?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2F5E3F" />

    <!-- Installable web app: lets Android Chrome fire `beforeinstallprompt`
         and gives the saved-to-home-screen launcher a name + icon. -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- iOS Safari: Apple ignores the manifest, so these meta tags are how
         we get a clean home-screen icon, a custom short label, and a
         standalone (chrome-less) launch experience. -->
    <link rel="apple-touch-icon" href="./icon-austria.png?v=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Austria '26" />

    <title>Austria 2026 — our family adventure</title>
    <meta
      name="description"
      content="18 days across Austria — alps, lakes and castles, 9–26 August 2026. Itinerary, map, stays, attractions and tips for our family adventure."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://talgreen.github.io/austria-2026/" />

    <!-- Open Graph (WhatsApp, Facebook, iMessage, LinkedIn, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Austria 2026" />
    <meta property="og:url" content="https://talgreen.github.io/austria-2026/" />
    <meta property="og:title" content="Austria 2026 — our family adventure" />
    <meta
      property="og:description"
      content="18 days across Austria — alps, lakes and castles, 9–26 August 2026. Itinerary, map, stays and tips for our family adventure."
    />
    <meta property="og:image" content="https://talgreen.github.io/austria-2026/images/og-cover.jpg" />
    <meta property="og:image:secure_url" content="https://talgreen.github.io/austria-2026/images/og-cover.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="800" />
    <meta property="og:image:alt" content="Alpine lake and peaks in Austria." />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="he_IL" />

    <!-- Twitter / X (also used as a fallback by some clients) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Austria 2026 — our family adventure" />
    <meta
      name="twitter:description"
      content="18 days across Austria — alps, lakes and castles, 9–26 August 2026. Itinerary, map, stays and tips for our family adventure."
    />
    <meta name="twitter:image" content="https://talgreen.github.io/austria-2026/images/og-cover.jpg" />
    <meta name="twitter:image:alt" content="Alpine lake and peaks in Austria." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,600&family=Inter:wght@300;400;500;600;700&family=Suez+One&family=Assistant:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
