            - generic [ref=e1000]: Salzburger Nockerl
            - paragraph [ref=e1001]: A giant, cloud-like baked soufflé shaped into three peaks said to mirror Salzburg's hills, dusted with icing sugar. Sweet, airy and theatrical — order one for the table on the Salzburg days.
            - generic [ref=e1002]: לטעום בA traditional Salzburg restaurant
