            - heading "מלאנז׳ וינאי" [level=4] [ref=e1083]
            - generic [ref=e1084]: Melange
            - paragraph [ref=e1085]: "Vienna's signature coffee — espresso softened with steamed milk and a cap of foam, served with a glass of water and ideally a slice of strudel. The coffee-house ritual is half the point: sit, linger, let the kids share a cake."
