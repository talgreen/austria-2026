            - heading "בייגלה וארוחת בוקר מהמאפייה" [level=4] [ref=e1011]
            - generic [ref=e1012]: Brezel / Semmel
            - paragraph [ref=e1013]: Austrian bakeries (Bäckerei) are everywhere and brilliant — soft pretzels, crusty Semmel rolls, poppy-seed pastries. The easiest, cheapest, kid-friendly breakfast and picnic fuel for the road. Open early, but closed Sundays.
            - generic [ref=e1014]: לטעום בAny village Bäckerei, first thing
        - listitem [ref=e1015]:
