            - generic [ref=e1072]: Stiegl / Gösser
            - paragraph [ref=e1073]: Salzburg's own Stiegl (and Styria's Gösser) are the everyday Austrian lagers — crisp and refreshing after a mountain day. A 'Radler' (beer cut with lemonade) is the lighter, sessionable summer option. Adults only.
            - generic [ref=e1074]: לטעום בA beer garden or mountain hut terrace
        - listitem [ref=e1075]:
          - generic [ref=e1076]:
