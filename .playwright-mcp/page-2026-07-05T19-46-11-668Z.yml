          - generic [ref=e1058]:
            - heading "גרינר וֶלטלינר" [level=4] [ref=e1059]
            - generic [ref=e1060]: Grüner Veltliner
            - paragraph [ref=e1061]: Austria's signature crisp white wine — peppery, citrusy and easy-drinking, the perfect grown-up glass with a schnitzel dinner. Adults only. A spritzer ('G'spritzter') is the lighter, lower-alcohol version locals drink in summer.
            - generic [ref=e1062]: לטעום בA Viennese Heuriger or any Gasthaus
        - listitem [ref=e1063]:
