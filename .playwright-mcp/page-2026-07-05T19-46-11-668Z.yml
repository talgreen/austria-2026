            - generic [ref=e1036]: Almdudler
            - paragraph [ref=e1037]: "Austria's beloved herbal lemonade — fizzy, golden, a little like elderflower-meets-ginger-ale, and totally kid-friendly. The unofficial national soft drink: order it everywhere and let the kids feel local."
            - generic [ref=e1038]: לטעום בEvery restaurant and hut
