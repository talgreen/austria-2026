            - generic [ref=e922]: Kasspatzln
            - paragraph [ref=e923]: Soft egg-noodle dumplings tossed with mountain cheese and crowned with sweet fried onions — the Tyrolean answer to mac-and-cheese, and a reliable hit with small kids after a cable-car day. Rich, gooey alpine comfort food.
            - generic [ref=e924]: לטעום בAny Zillertal or Pinzgau mountain hut
