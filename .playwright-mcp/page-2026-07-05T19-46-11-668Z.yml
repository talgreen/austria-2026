            - generic [ref=e1048]: Apfelsaft g'spritzt
            - paragraph [ref=e1049]: Cloudy apple juice cut with sparkling water — the default refreshing kids' (and grown-ups') drink on a hot terrace. 'Gespritzt' just means topped with soda; ask for it 'gespritzt' to make a juice last longer in the heat.
            - generic [ref=e1050]: לטעום בAny terrace on a hot day
