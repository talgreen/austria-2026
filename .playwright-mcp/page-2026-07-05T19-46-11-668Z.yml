            - generic [ref=e907]: Wiener Schnitzel
            - paragraph [ref=e908]: "The national dish: a thin veal cutlet pounded flat, breaded and fried to a crisp golden cloud, served with a lemon wedge and potato salad or parsley potatoes. Kids almost always love it (ask for the pork 'Schnitzel vom Schwein' version, which is cheaper and just as good). Vienna is the spiritual home."
            - generic [ref=e909]: לטעום בSternbräu in Salzburg, or any Viennese Gasthaus
        - listitem [ref=e910]:
