            - generic [ref=e964]: Kaiserschmarrn
            - paragraph [ref=e965]: A fluffy shredded pancake dusted with icing sugar and served with plum or apple sauce — half dessert, half lunch, and a guaranteed kid-pleaser on a mountain terrace. 'The Emperor's mess'. Order one to share; the portions are huge.
