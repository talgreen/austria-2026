            - generic [ref=e952]: Kasnocken
            - paragraph [ref=e953]: The Pinzgau's own cheese-dumpling dish — soft Nocken baked with pungent local cheese and onions, usually served in a little iron pan. The signature plate of the Zell am See / Kaprun week.
            - generic [ref=e954]: לטעום בDorfkrug Kaprun or a mountain hut near Zell am See
