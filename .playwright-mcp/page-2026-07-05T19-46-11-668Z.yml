            - generic [ref=e937]: Tafelspitz
            - paragraph [ref=e938]: Tender beef simmered in broth and served with apple-horseradish and chive sauce — Emperor Franz Joseph's favourite and a Viennese institution. A gentler, less-fried alternative to schnitzel for a sit-down dinner.
            - generic [ref=e939]: לטעום בA traditional Viennese Beisl
