            - generic [ref=e988]: Original Sacher-Torte
            - paragraph [ref=e989]: Vienna's famous dense chocolate cake with a thin layer of apricot jam under a dark chocolate glaze, served with unsweetened whipped cream. A grown-up treat and a fun 'we were really in Vienna' moment.
            - generic [ref=e990]: לטעום בCafé Sacher / Demel in Vienna
