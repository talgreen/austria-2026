            - generic [ref=e976]: Apfelstrudel
            - paragraph [ref=e977]: Wafer-thin pastry rolled around spiced apples, raisins and breadcrumbs, served warm with vanilla sauce or cream. The cornerstone of the Austrian coffee house and an easy treat to share between the kids.
            - generic [ref=e978]: לטעום בA Vienna Kaffeehaus, with a Melange
