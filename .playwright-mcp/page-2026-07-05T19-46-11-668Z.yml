            - heading "גלידה (Eis)" [level=4] [ref=e1023]
            - generic [ref=e1024]: Eis
            - paragraph [ref=e1025]: Every town square and lakefront has a gelateria-style Eissalon, and an ice cream is the universal currency of a good family day. A scoop on the Getreidegasse, the Zell am See promenade or a Vienna square is non-negotiable.
            - generic [ref=e1026]: לטעום בLakefronts and old-town squares everywhere
        - listitem [ref=e1027]:
