    - generic [ref=e1872]:
      - generic [ref=e1873]:
        - generic [ref=e1876]: מודיעין מקומי
        - heading "טיפים ואזהרות שקטות" [level=2] [ref=e1877]
        - paragraph [ref=e1878]: מה שלמדנו בדרך הקשה — כדי שלא תצטרכו
      - generic [ref=e1879]:
        - generic [ref=e1881]:
          - img [ref=e1883]
          - generic [ref=e1885]:
            - heading "לקנות מדבקת אוטוסטרדה (Vignette) לפני שנוסעים" [level=3] [ref=e1886]
            - paragraph [ref=e1887]: Austria's motorways (Autobahn/Schnellstraße) require a Vignette toll sticker — drive without one and the fine is steep. For a rental, check whether one is already on the windscreen; if not, buy a digital 10-day Vignette online (asfinag.at) tied to the licence plate before you hit the first motorway out of Vienna. It is separate from the special toll roads below.
        - generic [ref=e1889]:
          - img [ref=e1891]
          - generic [ref=e1893]:
            - heading "כמה כבישים נופיים עולים תוספת (גלוקנר, אכנזה)" [level=3] [ref=e1894]
            - paragraph [ref=e1895]: A handful of spectacular routes are NOT covered by the Vignette and charge their own toll — most notably the Großglockner High Alpine Road near Wildpark Ferleiten. Budget cash/card for these separately and check whether your day's drive uses one.
        - generic [ref=e1897]:
          - img [ref=e1899]
          - generic [ref=e1901]:
            - heading "החנויות סגורות בימי ראשון — להצטייד בשבת" [level=3] [ref=e1902]
            - paragraph [ref=e1903]: Austrian supermarkets and most shops shut on Sundays and public holidays (15 August, Assumption, is a holiday and falls mid-trip). Restaurants and attractions stay open, but for groceries, nappies and picnic food, buy ahead on Saturday. In Vienna the BILLA Corso on Neuer Markt is a rare Sunday-open lifesaver.
        - generic [ref=e1905]:
          - img [ref=e1907]
          - generic [ref=e1909]:
            - heading "מזג האוויר בהרים מתהפך מהר — לארוז שכבות" [level=3] [ref=e1910]
            - paragraph [ref=e1911]: Even in August the high cable-car stations (Kitzsteinhorn at ~3,000 m, the Schmitten, the glacier platforms) are cold and windy, and afternoon thunderstorms build over the peaks. Pack a warm layer and a rain shell for everyone every day, do exposed summits in the morning, and check the day's mountain forecast before committing to a cable car.
        - generic [ref=e1913]:
          - img [ref=e1915]
          - generic [ref=e1917]:
            - heading "חלק מהאתרים דורשים מנשא בלבד (בלי עגלה)" [level=3] [ref=e1918]
            - paragraph [ref=e1919]: "The big 'wow' stops on stairs and narrow walkways do NOT take a stroller: the Eisriesenwelt ice cave (~700 steps), the Salzwelten salt mine, the Sigmund-Thun gorge and the Krimml Waterfalls trail. Bring the baby carrier on those days and leave the pram in the car. Plenty of other days (Wildpark Ferleiten, Swarovski, the lakes, Vienna) are fully stroller-friendly."
        - generic [ref=e1921]:
          - img [ref=e1923]
          - generic [ref=e1925]:
            - heading "להחזיק קצת מזומן לפינות האלפיניות הקטנות" [level=3] [ref=e1926]
            - paragraph [ref=e1927]: Cards work almost everywhere, but smaller mountain huts, parking machines, the odd climbing park (Anif is cash-only) and village bakeries still prefer or require cash. Keep €100–150 in small notes and coins for parking and snacks.
        - generic [ref=e1929]:
          - img [ref=e1931]
          - generic [ref=e1933]:
            - 'heading "טיפ: לעגל כלפי מעלה כ־5–10%, ולתת ישירות" [level=3] [ref=e1934]'
            - paragraph [ref=e1935]: In restaurants and cafés you tip by rounding up the bill — roughly 5–10% — and you hand it to the server (or say the total you want to pay) rather than leaving coins on the table. A coffee gets the change rounded up; a full dinner about 10%.
        - generic [ref=e1937]:
          - img [ref=e1939]
          - generic [ref=e1941]:
            - heading "האגמים האלפיניים יפהפיים — וקרים" [level=3] [ref=e1942]
            - paragraph [ref=e1943]: The turquoise lakes (Achensee, Zell am See, the Gosausee) look tropical but the water is bracing. For actual swimming with little ones, the heated lidos — Kirchberg's heated pool, the Zell am See Strandbad, Mondsee's Alpenseebad — are the comfortable bet. Bring water shoes for stony shores.
        - generic [ref=e1945]:
          - img [ref=e1947]
          - generic [ref=e1949]:
            - heading "להזמין מראש את האתרים עם כניסה בשעות קבועות" [level=3] [ref=e1950]
            - paragraph [ref=e1951]: August is peak season. Schönbrunn Palace, the ZOOM children's museum, the Salzwelten salt mine and the Eisriesenwelt ice cave all run on timed slots that sell out — book these online in advance. For the Zillertal steam train, reserve heritage-coach seats ahead too.
        - generic [ref=e1953]:
          - img [ref=e1955]
          - generic [ref=e1957]:
            - heading "מושבי בטיחות לילדים ונהיגה באלפים" [level=3] [ref=e1958]
            - paragraph [ref=e1959]: Austria requires height/age-appropriate child seats — confirm the rental provides the right seats for two kids plus an infant when you book. Alpine roads are well-built but winding; plan drive times generously with stops, and keep the dashcam-worthy passes (Gerlos, Glockner) for daytime.
