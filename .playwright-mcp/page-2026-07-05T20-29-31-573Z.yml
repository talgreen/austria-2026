      - generic [ref=e32]:
        - generic [ref=e34]:
          - img [ref=e36]
          - generic [ref=e38]:
            - heading "לקנות מדבקת אוטוסטרדה (Vignette) לפני שנוסעים" [level=3] [ref=e39]
            - paragraph [ref=e40]: הכבישים המהירים באוסטריה (Autobahn/Schnellstraße) מחייבים מדבקת אגרה בשם Vignette — נוסעים בלעדיה והקנס לא נעים בכלל. אם מדובר ברכב שכור, קודם תבדקו אם המדבקה כבר על השמשה הקדמית; אם לא, קונים אונליין Vignette דיגיטלית ל-10 ימים (asfinag.at) שמשויכת למספר הרישוי, עוד לפני שיוצאים מווינה לכביש המהיר הראשון. זה נפרד לגמרי מכבישי האגרה המיוחדים שמפורטים בהמשך.
        - generic [ref=e42]:
          - img [ref=e44]
          - generic [ref=e46]:
            - heading "כמה כבישים נופיים עולים תוספת (גלוקנר, אכנזה)" [level=3] [ref=e47]
            - paragraph [ref=e48]: כמה כבישים מרהיבים במיוחד לא נכללים ב-Vignette וגובים אגרה נפרדת משלהם — הבולט מביניהם הוא כביש ההרים הגבוה גלוקנר (Großglockner High Alpine Road) ליד Wildpark Ferleiten. כדאי לתכנן מראש תשלום נפרד במזומן או בכרטיס, ולבדוק אם הנסיעה של אותו יום עוברת דרך אחד מהם.
        - generic [ref=e50]:
          - img [ref=e52]
          - generic [ref=e54]:
            - heading "החנויות סגורות בימי ראשון — להצטייד בשבת" [level=3] [ref=e55]
            - paragraph [ref=e56]: סופרמרקטים וכמעט כל החנויות באוסטריה סגורים בימי ראשון ובחגים (ה-15 באוגוסט, חג העלייה לשמיים, הוא יום חופש שנופל באמצע הטיול). מסעדות ואטרקציות נשארות פתוחות, אבל לקניות מצרכים, חיתולים ואוכל לפיקניק כדאי להצטייד כבר בשבת. בווינה, סניף BILLA Corso ברחוב Neuer Markt הוא אחד הבודדים שפתוחים גם בימי ראשון, ופשוט מציל.
        - generic [ref=e58]:
          - img [ref=e60]
          - generic [ref=e62]:
            - heading "מזג האוויר בהרים מתהפך מהר — לארוז שכבות" [level=3] [ref=e63]
            - paragraph [ref=e64]: גם באוגוסט, בתחנות הרכבל הגבוהות (Kitzsteinhorn בגובה כ-3,000 מ׳, ה-Schmitten, המדפים על הקרחון) קר ורוחות חזקות, ואחר הצהריים נוטות להתפתח סופות רעמים מעל הפסגות. כדאי לארוז שכבה חמה ומעיל גשם לכל אחד, בכל יום, לתכנן ביקורים בפסגות חשופות לשעות הבוקר, ולבדוק את תחזית ההרים של אותו יום לפני שקופצים לרכבל.
        - generic [ref=e66]:
          - img [ref=e68]
          - generic [ref=e70]:
            - heading "חלק מהאתרים דורשים מנשא בלבד (בלי עגלה)" [level=3] [ref=e71]
            - paragraph [ref=e72]: "העצירות הגדולות שכוללות מדרגות ומעברים צרים לא מתאימות לעגלה: מערת הקרח Eisriesenwelt (כ-700 מדרגות), מכרה המלח Salzwelten, קניון Sigmund-Thun ומסלול מפלי Krimml. באותם ימים כדאי לקחת את המנשא ולהשאיר את העגלה ברכב. הרבה ימים אחרים (Wildpark Ferleiten, Swarovski, האגמים, וינה) מתאימים לגמרי לעגלה."
        - generic [ref=e74]:
          - img [ref=e76]
          - generic [ref=e78]:
            - heading "להחזיק קצת מזומן לפינות האלפיניות הקטנות" [level=3] [ref=e79]
            - paragraph [ref=e80]: כרטיס אשראי עובד כמעט בכל מקום, אבל בבקתות הרים קטנות, מכונות חניה, כמה פארקי טיפוס (ב-Anif למשל מקבלים רק מזומן) ומאפיות כפריות עדיין מעדיפים או דורשים מזומן. כדאי להחזיק 100–150 יורו בשטרות קטנים ומטבעות לחניה ולחטיפים.
        - generic [ref=e82]:
          - img [ref=e84]
          - generic [ref=e86]:
            - 'heading "טיפ: לעגל כלפי מעלה כ־5–10%, ולתת ישירות" [level=3] [ref=e87]'
            - paragraph [ref=e88]: במסעדות ובבתי קפה נותנים טיפ על ידי עיגול החשבון כלפי מעלה — בערך 5–10% — ומוסרים אותו ישירות למלצר (או פשוט אומרים את הסכום הכולל שרוצים לשלם), במקום להשאיר מטבעות על השולחן. על קפה מעגלים את העודף; על ארוחת ערב מלאה בערך 10%.
        - generic [ref=e90]:
          - img [ref=e92]
          - generic [ref=e94]:
            - heading "האגמים האלפיניים יפהפיים — וקרים" [level=3] [ref=e95]
            - paragraph [ref=e96]: האגמים הטורקיזים (Achensee, Zell am See, Gosausee) נראים כמו גלויה טרופית, אבל המים שם קרים ומרעננים עד כדי כאב. לשחייה אמיתית עם הקטנים, בריכות הצף המחוממות — הבריכה המחוממת ב-Kirchberg, ה-Strandbad ב-Zell am See, ה-Alpenseebad ב-Mondsee — הן ההימור הבטוח והנעים. כדאי לקחת נעלי מים לחופים המאובנים.
        - generic [ref=e98]:
          - img [ref=e100]
          - generic [ref=e102]:
            - heading "להזמין מראש את האתרים עם כניסה בשעות קבועות" [level=3] [ref=e103]
            - paragraph [ref=e104]: אוגוסט הוא שיא העונה. ארמון שנברון, מוזיאון הילדים ZOOM, מכרה המלח Salzwelten ומערת הקרח Eisriesenwelt פועלים בשיטת כניסה בשעות קבועות שנחטפת מהר — כדאי להזמין אונליין מראש. גם לרכבת הקיטור בצילרטל שווה להזמין מקומות בקרון ההיסטורי מראש.
        - generic [ref=e106]:
          - img [ref=e108]
          - generic [ref=e110]:
            - heading "מושבי בטיחות לילדים ונהיגה באלפים" [level=3] [ref=e111]
            - paragraph [ref=e112]: באוסטריה חובה מושבי בטיחות מותאמים לגובה/גיל של הילד — כדאי לוודא כבר בהזמנה שחברת ההשכרה מספקת את המושבים הנכונים לשני ילדים ותינוק. הכבישים ההרריים סלולים היטב אבל מתפתלים; כדאי לתכנן זמני נסיעה נדיבים עם עצירות, ולשמור את המעברים המרהיבים לצילום (Gerlos, גלוקנר) לשעות היום.
